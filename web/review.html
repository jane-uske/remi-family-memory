<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review - Remi Family Memory</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #faf8f5;
      color: #3d3530;
      line-height: 1.6;
    }

    header {
      background: linear-gradient(135deg, #f7e8d5 0%, #fce4ec 100%);
      padding: 2rem 2rem 1.5rem;
      border-bottom: 1px solid #f0dcc8;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #5d4037;
      text-align: center;
    }

    header .subtitle {
      text-align: center;
      color: #8d6e63;
      font-size: 0.9rem;
      margin-top: 0.3rem;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 1rem;
    }

    nav a {
      color: #5d4037;
      text-decoration: none;
      font-size: 0.85rem;
      padding: 0.3rem 0.8rem;
      border-radius: 6px;
      transition: background 0.2s;
    }

    nav a:hover { background: rgba(93, 64, 55, 0.08); }
    nav a.active { background: rgba(93, 64, 55, 0.12); font-weight: 600; }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.5rem 1.5rem 4rem;
    }

    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid #f0dcc8;
    }

    .tab {
      padding: 0.7rem 1.2rem;
      font-size: 0.9rem;
      color: #8d6e63;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }

    .tab:hover { color: #5d4037; }
    .tab.active {
      color: #5d4037;
      font-weight: 600;
      border-bottom-color: #5d4037;
    }

    .tab .count {
      display: inline-block;
      background: #f0dcc8;
      color: #5d4037;
      font-size: 0.7rem;
      padding: 0.1em 0.5em;
      border-radius: 10px;
      margin-left: 0.4rem;
      font-weight: 600;
    }

    .tab.active .count { background: #5d4037; color: #fff; }

    .section { display: none; }
    .section.active { display: block; }

    .empty {
      text-align: center;
      padding: 3rem 2rem;
      color: #a1887f;
    }

    /* Memory cards */
    .memory-card {
      background: #fff;
      border: 1px solid #efe5db;
      border-radius: 12px;
      padding: 1.1rem 1.3rem;
      margin-bottom: 0.85rem;
      box-shadow: 0 1px 3px rgba(93, 64, 55, 0.06);
    }

    .memory-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.3rem;
    }

    .memory-date {
      font-size: 0.78rem;
      color: #a1887f;
    }

    .memory-type {
      display: inline-block;
      font-size: 0.68rem;
      padding: 0.12em 0.55em;
      border-radius: 999px;
      font-weight: 500;
      background: #f5f0eb;
      color: #8d6e63;
    }

    .memory-title {
      font-size: 1rem;
      font-weight: 600;
      color: #3e2723;
      margin-bottom: 0.3rem;
    }

    .memory-summary {
      font-size: 0.87rem;
      color: #6d5d53;
      margin-bottom: 0.5rem;
    }

    .memory-facts {
      margin: 0.5rem 0;
      padding: 0.5rem 0.8rem;
      background: #faf5f0;
      border-radius: 8px;
      font-size: 0.8rem;
      color: #5d4037;
    }

    .memory-facts li {
      list-style: none;
      padding: 0.15rem 0;
    }

    .memory-facts li::before {
      content: '·';
      margin-right: 0.5rem;
      color: #a1887f;
    }

    .provenance-note {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.72rem;
      color: #8d6e63;
      background: #f5f0eb;
      padding: 0.2em 0.6em;
      border-radius: 4px;
      margin-top: 0.4rem;
    }

    .provenance-note .icon { font-size: 0.8rem; }

    .importance-badge {
      display: inline-block;
      font-size: 0.65rem;
      padding: 0.1em 0.45em;
      border-radius: 4px;
      font-weight: 600;
      margin-left: 0.3rem;
    }

    .importance-core { background: #fff3e0; color: #e65100; }
    .importance-high { background: #fce4ec; color: #c2185b; }
    .importance-medium { background: #e8f5e9; color: #2e7d32; }
    .importance-low { background: #eceff1; color: #607d8b; }

    /* Draft cards */
    .draft-card {
      background: #fff;
      border: 1px solid #ffe0b2;
      border-left: 4px solid #ff9800;
      border-radius: 12px;
      padding: 1.1rem 1.3rem;
      margin-bottom: 0.85rem;
      box-shadow: 0 1px 3px rgba(93, 64, 55, 0.06);
    }

    .draft-status {
      display: inline-block;
      font-size: 0.68rem;
      padding: 0.15em 0.55em;
      border-radius: 999px;
      font-weight: 600;
      background: #fff3e0;
      color: #e65100;
    }

    .draft-files {
      font-size: 0.8rem;
      color: #8d6e63;
      margin-top: 0.3rem;
    }

    .draft-enrichment {
      font-size: 0.78rem;
      color: #4caf50;
      margin-top: 0.3rem;
    }

    .draft-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.8rem;
    }

    .btn {
      padding: 0.4rem 1rem;
      font-size: 0.82rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-confirm {
      background: #4caf50;
      color: #fff;
    }

    .btn-confirm:hover { background: #388e3c; }

    .btn-reject {
      background: #fff;
      color: #8d6e63;
      border: 1px solid #e0d0c0;
    }

    .btn-reject:hover { background: #faf5f0; }

    .btn-disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .summary-input {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.5rem 0.7rem;
      border: 1px solid #e0d0c0;
      border-radius: 6px;
      font-size: 0.85rem;
      font-family: inherit;
      resize: vertical;
      min-height: 2.5rem;
    }

    .summary-input:focus {
      outline: none;
      border-color: #8d6e63;
    }

    .stage-label {
      font-size: 0.75rem;
      color: #a1887f;
      background: #f5f0eb;
      padding: 0.15em 0.5em;
      border-radius: 4px;
      margin-left: 0.3rem;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: #3e2723;
      color: #fff;
      padding: 0.7rem 1.5rem;
      border-radius: 8px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show { opacity: 1; }

    /* v1.5: Dashboard panel */
    .dashboard {
      background: linear-gradient(135deg, #fff8e1 0%, #fce4ec 100%);
      border: 1px solid #ffe0b2;
      border-radius: 12px;
      padding: 1rem 1.3rem;
      margin-bottom: 1.5rem;
    }

    .dashboard-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #5d4037;
      margin-bottom: 0.6rem;
    }

    .dashboard-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }

    .stat-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.78rem;
      padding: 0.25em 0.7em;
      border-radius: 999px;
      background: #fff;
      border: 1px solid #f0dcc8;
      color: #5d4037;
    }

    .stat-chip .num {
      font-weight: 700;
      color: #e65100;
    }

    .stat-chip.ok .num { color: #2e7d32; }
    .stat-chip.warn .num { color: #e65100; }

    .dashboard-hint {
      font-size: 0.75rem;
      color: #a1887f;
      margin-top: 0.6rem;
    }

    .dashboard-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.7rem;
    }

    .btn-sync {
      padding: 0.35rem 0.9rem;
      font-size: 0.78rem;
      border-radius: 6px;
      border: 1px solid #8d6e63;
      background: #fff;
      color: #5d4037;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-sync:hover { background: #f5f0eb; }
    .btn-sync:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-sync.syncing { border-color: #4caf50; color: #4caf50; }

    /* v1.5: Quick capture */
    .quick-capture {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .quick-capture input {
      flex: 1;
      padding: 0.6rem 0.9rem;
      border: 1px solid #e0d0c0;
      border-radius: 8px;
      font-size: 0.88rem;
      font-family: inherit;
      background: #fff;
    }

    .quick-capture input:focus {
      outline: none;
      border-color: #8d6e63;
      box-shadow: 0 0 0 2px rgba(141, 110, 99, 0.1);
    }

    .quick-capture button {
      padding: 0.6rem 1.2rem;
      background: #5d4037;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }

    .quick-capture button:hover { background: #4e342e; }
    .quick-capture button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* v1.8: Trial stats */
    .trial-panel {
      background: #fff;
      border: 1px solid #e8f5e9;
      border-left: 4px solid #4caf50;
      border-radius: 12px;
      padding: 1rem 1.3rem;
      margin-bottom: 1.5rem;
      font-size: 0.8rem;
    }

    .trial-panel .trial-title {
      font-size: 0.82rem;
      font-weight: 600;
      color: #2e7d32;
      margin-bottom: 0.5rem;
    }

    .trial-stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.3rem 1.5rem;
      color: #5d4037;
    }

    .trial-stats-grid .label { color: #8d6e63; }
    .trial-stats-grid .val { font-weight: 600; text-align: right; }

    .trial-record-btn {
      margin-top: 0.6rem;
      padding: 0.3rem 0.8rem;
      font-size: 0.75rem;
      border-radius: 5px;
      border: 1px solid #4caf50;
      background: #fff;
      color: #2e7d32;
      cursor: pointer;
    }

    .trial-record-btn:hover { background: #e8f5e9; }

    /* v1.5: Filter chips */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    .filter-chip {
      font-size: 0.75rem;
      padding: 0.2em 0.7em;
      border-radius: 999px;
      border: 1px solid #e0d0c0;
      background: #fff;
      color: #8d6e63;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-chip:hover { border-color: #8d6e63; }
    .filter-chip.active { background: #5d4037; color: #fff; border-color: #5d4037; }

    .review-form {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) 150px 160px;
      gap: 0.6rem;
      margin: 1rem 0;
    }

    .review-field {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      font-size: 0.78rem;
      color: #8d6e63;
      font-weight: 600;
    }

    .review-field input,
    .review-field select,
    .facts-input {
      border: 1px solid #d9c8ba;
      border-radius: 6px;
      padding: 0.55rem 0.65rem;
      font: inherit;
      color: #3e2723;
      background: #fff;
    }

    .evidence-block {
      margin-top: 0.9rem;
      border-top: 1px solid #f0e2d6;
      padding-top: 0.9rem;
    }

    .evidence-title {
      font-size: 0.82rem;
      font-weight: 700;
      color: #5d4037;
      margin-bottom: 0.5rem;
    }

    .attachment-evidence {
      padding: 0.65rem 0;
      border-bottom: 1px solid #f6ece4;
    }

    .attachment-head {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      font-size: 0.82rem;
      margin-bottom: 0.35rem;
    }

    .attachment-head a {
      color: #5d4037;
      font-weight: 700;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .ocr-status {
      padding: 0.12rem 0.45rem;
      border-radius: 999px;
      background: #edf7ed;
      color: #2e7d32;
      font-size: 0.72rem;
      font-weight: 600;
    }

    .ocr-lines {
      margin: 0.35rem 0 0;
      padding-left: 1.2rem;
      color: #5d4037;
      line-height: 1.55;
      font-size: 0.84rem;
    }

    .facts-input {
      width: 100%;
      min-height: 7rem;
      resize: vertical;
      line-height: 1.45;
    }

    .draft-warning {
      color: #b45309;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 6px;
      padding: 0.45rem 0.6rem;
      margin-top: 0.5rem;
      font-size: 0.82rem;
    }

    @media (max-width: 720px) {
      .review-form {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Remi Family Memory</h1>
    <p class="subtitle">A local-first family memory system</p>
    <nav>
      <a href="/">Timeline</a>
      <a href="/review.html" class="active">Review</a>
      <a href="/profile.html">Profile</a>
    </nav>
  </header>

  <div class="container">
    <!-- v1.5: Today's dashboard -->
    <div class="dashboard" id="dashboard">
      <div class="dashboard-title">今日待办</div>
      <div class="dashboard-stats" id="dashboard-stats">
        <span class="stat-chip">加载中...</span>
      </div>
      <div class="dashboard-hint" id="dashboard-hint"></div>
      <div class="dashboard-actions">
        <button class="btn-sync" id="sync-btn" onclick="runSync()">同步刷新记忆</button>
      </div>
    </div>

    <!-- v1.5: Quick capture -->
    <div class="quick-capture">
      <input type="text" id="capture-input" placeholder="快速记录：一句话记家庭事件..." maxlength="200" />
      <button id="capture-btn" onclick="quickCapture()">记录</button>
    </div>

    <!-- v1.8: Trial tracker -->
    <div class="trial-panel" id="trial-panel" style="display:none;">
      <div class="trial-title">试用追踪</div>
      <div class="trial-stats-grid" id="trial-stats"></div>
      <button class="trial-record-btn" onclick="recordTrialDay()">记录今日</button>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="pending">待确认 <span class="count" id="pending-count">0</span></div>
      <div class="tab" data-tab="confirmed">已确认记忆 <span class="count" id="confirmed-count">0</span></div>
    </div>

    <!-- v1.5: Filters for pending -->
    <div id="pending-filters" class="filters">
      <span class="filter-chip active" data-filter="all">全部</span>
      <span class="filter-chip" data-filter="ready">可确认</span>
      <span class="filter-chip" data-filter="needs-title">缺标题</span>
      <span class="filter-chip" data-filter="ocr-error">OCR失败</span>
    </div>

    <!-- v1.5: Filters for confirmed -->
    <div id="confirmed-filters" class="filters" style="display:none;">
      <span class="filter-chip active" data-filter="all">全部</span>
      <span class="filter-chip" data-filter="today">今日</span>
      <span class="filter-chip" data-filter="vlm">VLM辅助</span>
      <span class="filter-chip" data-filter="ocr">OCR辅助</span>
    </div>

    <div id="pending-section" class="section active"></div>
    <div id="confirmed-section" class="section"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const TYPE_LABELS = {
      pregnancy_checkup: '孕检', fetal_movement: '胎动', birth: '出生',
      milestone: '里程碑', parent_note: '父母手记', family_event: '家庭事件',
      medical_record: '医疗记录', vaccine: '疫苗', growth_metric: '成长指标',
      photo_memory: '照片记忆', voice_memory: '语音记忆', video: '视频',
      system_event: '系统事件',
    }

    function formatDate(iso) {
      if (!iso) return '未知日期'
      const d = new Date(iso)
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`
    }

    function showToast(msg) {
      const el = document.getElementById('toast')
      el.textContent = msg
      el.classList.add('show')
      setTimeout(() => el.classList.remove('show'), 2500)
    }

    // --- Tabs ---
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'))
        tab.classList.add('active')
        document.getElementById(tab.dataset.tab + '-section').classList.add('active')
        // Toggle filter visibility
        document.getElementById('pending-filters').style.display = tab.dataset.tab === 'pending' ? 'flex' : 'none'
        document.getElementById('confirmed-filters').style.display = tab.dataset.tab === 'confirmed' ? 'flex' : 'none'
      })
    })

    // --- v1.5: Dashboard ---
    async function loadDashboard() {
      try {
        const res = await fetch('/api/dashboard')
        const data = await res.json()
        const stats = []

        if (data.pending.total > 0) {
          stats.push(`<span class="stat-chip warn"><span class="num">${data.pending.total}</span> 条待确认</span>`)
        }
        if (data.pending.readyToConfirm > 0) {
          stats.push(`<span class="stat-chip ok"><span class="num">${data.pending.readyToConfirm}</span> 条可直接确认</span>`)
        }
        if (data.pending.needsTitle > 0) {
          stats.push(`<span class="stat-chip warn"><span class="num">${data.pending.needsTitle}</span> 条缺标题</span>`)
        }
        if (data.pending.ocrError > 0) {
          stats.push(`<span class="stat-chip warn"><span class="num">${data.pending.ocrError}</span> 条OCR失败</span>`)
        }
        if (data.confirmed.today > 0) {
          stats.push(`<span class="stat-chip ok"><span class="num">${data.confirmed.today}</span> 条今日已确认</span>`)
        }

        if (stats.length === 0) {
          stats.push(`<span class="stat-chip ok"><span class="num">0</span> 待处理，今日已完成</span>`)
        }

        document.getElementById('dashboard-stats').innerHTML = stats.join('')

        if (data.pending.total > 0) {
          document.getElementById('dashboard-hint').textContent = `Remi 提醒：你有 ${data.pending.total} 条家庭记忆待确认`
          document.title = `(${data.pending.total}) Review - Remi Family Memory`
        } else {
          document.getElementById('dashboard-hint').textContent = ''
          document.title = 'Review - Remi Family Memory'
        }
      } catch (e) {
        document.getElementById('dashboard-stats').innerHTML = '<span class="stat-chip">加载失败</span>'
      }
    }

    // --- v1.5: Quick Capture ---
    async function quickCapture() {
      const input = document.getElementById('capture-input')
      const btn = document.getElementById('capture-btn')
      const text = input.value.trim()
      if (!text) return

      btn.disabled = true
      try {
        const res = await fetch('/api/capture', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        })
        const data = await res.json()
        if (data.ok) {
          showToast('已记录！运行 npm run sync 后生成记忆')
          input.value = ''
          loadDashboard()
        } else {
          showToast(data.message || '记录失败')
        }
      } catch (e) {
        showToast('网络错误')
      } finally {
        btn.disabled = false
      }
    }

    document.getElementById('capture-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.isComposing) quickCapture()
    })

    // --- v1.6: Sync button ---
    async function runSync() {
      const btn = document.getElementById('sync-btn')
      btn.disabled = true
      btn.textContent = '同步中...'
      btn.classList.add('syncing')
      try {
        const res = await fetch('/api/sync', { method: 'POST' })
        const data = await res.json()
        if (data.ok) {
          const parts = []
          if (data.intake && data.intake.draftsCreated > 0) parts.push(`${data.intake.draftsCreated} 个新草稿`)
          if (data.scan.notesAdded > 0) parts.push(`${data.scan.notesAdded} 条新记录`)
          if (data.memory.created > 0) parts.push(`${data.memory.created} 条新记忆`)
          const msg = parts.length > 0 ? `已同步：${parts.join('，')}` : '已同步，无新变化'
          showToast(msg)
          loadDashboard()
          loadDrafts()
          loadMemories()
        } else {
          showToast('同步失败：' + (data.error || '未知错误'))
        }
      } catch (e) {
        showToast('网络错误')
      } finally {
        btn.disabled = false
        btn.textContent = '同步刷新记忆'
        btn.classList.remove('syncing')
      }
    }

    // --- v1.5: Filters ---
    let currentPendingFilter = 'all'
    let currentConfirmedFilter = 'all'
    let allDrafts = []
    let allMemories = []

    document.getElementById('pending-filters').addEventListener('click', (e) => {
      const chip = e.target.closest('.filter-chip')
      if (!chip) return
      document.querySelectorAll('#pending-filters .filter-chip').forEach(c => c.classList.remove('active'))
      chip.classList.add('active')
      currentPendingFilter = chip.dataset.filter
      renderDrafts()
    })

    document.getElementById('confirmed-filters').addEventListener('click', (e) => {
      const chip = e.target.closest('.filter-chip')
      if (!chip) return
      document.querySelectorAll('#confirmed-filters .filter-chip').forEach(c => c.classList.remove('active'))
      chip.classList.add('active')
      currentConfirmedFilter = chip.dataset.filter
      renderMemories()
    })

    function filterDrafts(drafts) {
      switch (currentPendingFilter) {
        case 'ready': return drafts.filter(d => d.inferredTitle && d.inferredDate)
        case 'needs-title': return drafts.filter(d => !d.inferredTitle)
        case 'ocr-error': return drafts.filter(d => d.ocrStatus === 'error')
        default: return drafts
      }
    }

    function filterMemories(memories) {
      const today = new Date().toISOString().slice(0, 10)
      switch (currentConfirmedFilter) {
        case 'today': return memories.filter(m => m.date === today || (m.createdAt && m.createdAt.startsWith(today)))
        case 'vlm': return memories.filter(m => m.provenance && m.provenance.vlmAssisted)
        case 'ocr': return memories.filter(m => m.provenance && m.provenance.ocrAssisted)
        default: return memories
      }
    }

    // --- Provenance ---
    function renderProvenance(prov) {
      if (!prov) return ''
      const parts = []
      if (prov.confidence === 'confirmed_by_parent') parts.push('家长已确认')
      if (prov.vlmAssisted && prov.ocrAssisted) parts.push('OCR + VLM 辅助整理')
      else if (prov.vlmAssisted) parts.push('VLM 辅助整理')
      else if (prov.ocrAssisted) parts.push('OCR 辅助提取')
      if (prov.confirmedAt) parts.push(formatDate(prov.confirmedAt) + ' 确认')
      if (parts.length === 0) return ''
      return `<div class="provenance-note"><span class="icon">&#x2713;</span> ${parts.join(' · ')}</div>`
    }

    // --- Confirmed Memories ---
    async function loadMemories() {
      try {
        const res = await fetch('/api/memories')
        const data = await res.json()
        allMemories = data.memories || []
        document.getElementById('confirmed-count').textContent = allMemories.length
        renderMemories()
      } catch (e) {
        document.getElementById('confirmed-section').innerHTML = '<div class="empty">加载失败</div>'
      }
    }

    function renderMemories() {
      const memories = filterMemories(allMemories)
      if (memories.length === 0) {
        const msg = currentConfirmedFilter === 'all'
          ? '还没有已确认的记忆。确认待审草稿后会出现在这里。'
          : '没有符合筛选条件的记忆。'
        document.getElementById('confirmed-section').innerHTML = `<div class="empty">${msg}</div>`
        return
      }

      const sorted = memories.sort((a, b) => b.date.localeCompare(a.date))
      let html = ''
      for (const m of sorted) {
        const factsHtml = m.facts && m.facts.length > 0
          ? `<ul class="memory-facts">${m.facts.slice(0, 5).map(f => `<li>${escHtml(f)}</li>`).join('')}</ul>`
          : ''
        html += `
          <div class="memory-card">
            <div class="memory-header">
              <span class="memory-date">${m.date}</span>
              <span class="memory-type">${TYPE_LABELS[m.type] || m.type}</span>
              <span class="importance-badge importance-${m.importance}">${m.importance}</span>
            </div>
            <div class="memory-title">${escHtml(m.title)}</div>
            <div class="memory-summary">${escHtml(m.summary || '')}</div>
            ${factsHtml}
            ${renderProvenance(m.provenance)}
          </div>
        `
      }
      document.getElementById('confirmed-section').innerHTML = html
    }

    // --- Pending Drafts ---
    async function loadDrafts() {
      try {
        const res = await fetch('/api/drafts/pending')
        const data = await res.json()
        allDrafts = data.drafts || []
        document.getElementById('pending-count').textContent = allDrafts.length
        renderDrafts()
      } catch (e) {
        document.getElementById('pending-section').innerHTML = '<div class="empty">加载失败</div>'
      }
    }

    function renderDrafts() {
      const drafts = filterDrafts(allDrafts)
      if (drafts.length === 0) {
        const msg = currentPendingFilter === 'all'
          ? '没有待确认的草稿。上传照片或文件后会出现在这里。'
          : '没有符合筛选条件的草稿。'
        document.getElementById('pending-section').innerHTML = `<div class="empty">${msg}</div>`
        return
      }

      let html = ''
      for (const d of drafts) {
        const ev = d.reviewEvidence || {}
        const title = d.inferredTitle || ev.suggestedTitle || d.originalFilenames.join(', ')
        const dateStr = d.inferredDate || '未知日期'
        const resolvedType = d.inferredType || ev.suggestedType || ''
        const typeStr = resolvedType ? (TYPE_LABELS[resolvedType] || resolvedType) : '待识别'
        const files = d.originalFilenames.join(', ')
        const usefulFacts = ev.usefulVlmFacts || []
        const discardedFacts = ev.discardedVlmFacts || []
        const suggestedFacts = ev.suggestedFacts || []
        const suggestedSummary = ev.suggestedSummary || ''
        const enriched = usefulFacts.length > 0
        const enrichHtml = enriched
          ? `<div class="draft-enrichment">&#x2713; VLM 可用候选：${usefulFacts.slice(0, 3).map(escHtml).join('、')}</div>`
          : ''
        const discardedHtml = discardedFacts.length > 0
          ? `<div class="draft-warning">已过滤不可信 VLM 输出：${discardedFacts.slice(0, 3).map(escHtml).join('、')}</div>`
          : ''
        const evidenceHtml = renderDraftEvidence(ev)
        const factsValue = suggestedFacts.join('\n')

        html += `
          <div class="draft-card" id="draft-${d.draftId}">
            <div class="memory-header">
              <span class="memory-date">${dateStr}</span>
              <span class="draft-status">待确认</span>
              <span class="memory-type">${typeStr}</span>
            </div>
            <div class="memory-title">${escHtml(title)}</div>
            <div class="draft-files">文件：${escHtml(files)}</div>
            ${enrichHtml}
            ${discardedHtml}
            ${evidenceHtml}
            <div class="review-form">
              <label class="review-field">标题
                <input id="title-${d.draftId}" value="${escAttr(title)}" />
              </label>
              <label class="review-field">类型
                <select id="type-${d.draftId}">
                  ${renderTypeOptions(resolvedType)}
                </select>
              </label>
              <label class="review-field">日期
                <input id="date-${d.draftId}" value="${escAttr(d.inferredDate || '')}" />
              </label>
            </div>
            <textarea class="summary-input" id="summary-${d.draftId}" placeholder="确认摘要">${escHtml(suggestedSummary)}</textarea>
            <textarea class="facts-input" id="facts-${d.draftId}" placeholder="确认事实：一行一条，确认后写入记忆 facts">${escHtml(factsValue)}</textarea>
            <div class="draft-actions">
              <button class="btn btn-confirm" onclick="confirmDraft('${d.draftId}')">确认</button>
              <button class="btn btn-reject" onclick="rejectDraft('${d.draftId}')">跳过</button>
            </div>
          </div>
        `
      }
      document.getElementById('pending-section').innerHTML = html
    }

    function renderTypeOptions(selected) {
      const options = ['', 'pregnancy_checkup', 'medical_record', 'growth_metric', 'parent_note', 'family_event']
      return options.map(value => {
        const label = value ? (TYPE_LABELS[value] || value) : '待识别'
        const isSelected = value === selected ? 'selected' : ''
        return `<option value="${escAttr(value)}" ${isSelected}>${escHtml(label)}</option>`
      }).join('')
    }

    function renderDraftEvidence(ev) {
      const attachments = ev.attachments || []
      if (attachments.length === 0) return ''

      return `
        <div class="evidence-block">
          <div class="evidence-title">OCR 证据</div>
          ${attachments.map((a) => {
            const lines = a.ocrLines || []
            const linesHtml = lines.length > 0
              ? `<ul class="ocr-lines">${lines.map(line => `<li>${escHtml(line)}</li>`).join('')}</ul>`
              : '<div class="draft-files">没有可读 OCR 片段</div>'
            return `
              <div class="attachment-evidence">
                <div class="attachment-head">
                  <a href="${escAttr(a.url)}" target="_blank" rel="noopener">${escHtml(a.filename)}</a>
                  <span class="ocr-status">OCR: ${escHtml(a.ocrStatus || 'missing')}</span>
                </div>
                ${linesHtml}
              </div>
            `
          }).join('')}
        </div>
      `
    }

    async function confirmDraft(draftId) {
      const summaryEl = document.getElementById(`summary-${draftId}`)
      const summary = summaryEl ? summaryEl.value.trim() : ''
      const title = document.getElementById(`title-${draftId}`)?.value.trim() || ''
      const date = document.getElementById(`date-${draftId}`)?.value.trim() || ''
      const type = document.getElementById(`type-${draftId}`)?.value.trim() || ''
      const factsRaw = document.getElementById(`facts-${draftId}`)?.value || ''
      const facts = factsRaw.split('\n').map(f => f.trim()).filter(Boolean)
      const body = {}
      if (title) body.title = title
      if (date) body.date = date
      if (type) body.type = type
      if (summary) body.summary = summary
      body.facts = facts

      try {
        const res = await fetch(`/api/drafts/${draftId}/confirm`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        })
        if (res.ok) {
          showToast('已确认，运行 npm run sync 后进入正式记忆')
          const card = document.getElementById(`draft-${draftId}`)
          if (card) card.style.opacity = '0.4'
          setTimeout(() => { loadDrafts(); loadMemories() }, 800)
        } else {
          const err = await res.json()
          showToast(`确认失败：${err.message || err.error}`)
        }
      } catch (e) {
        showToast('网络错误')
      }
    }

    async function rejectDraft(draftId) {
      try {
        const res = await fetch(`/api/drafts/${draftId}/reject`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}',
        })
        if (res.ok) {
          showToast('已跳过')
          const card = document.getElementById(`draft-${draftId}`)
          if (card) card.style.opacity = '0.4'
          setTimeout(loadDrafts, 800)
        } else {
          const err = await res.json()
          showToast(`拒绝失败：${err.message || err.error}`)
        }
      } catch (e) {
        showToast('网络错误')
      }
    }

    function escHtml(str) {
      const div = document.createElement('div')
      div.textContent = str
      return div.innerHTML
    }

    function escAttr(str) {
      return escHtml(str || '').replace(/"/g, '&quot;')
    }

    // --- v1.8: Trial tracker ---
    async function loadTrialStats() {
      try {
        const res = await fetch('/api/trial')
        const data = await res.json()
        const panel = document.getElementById('trial-panel')
        const grid = document.getElementById('trial-stats')
        panel.style.display = 'block'

        const s = data.summary
        const t = data.today
        grid.innerHTML = `
          <span class="label">试用天数</span><span class="val">${data.totalDaysLogged} 天 (连续 ${s.streakDays})</span>
          <span class="label">今日导入</span><span class="val">${t.assetsImported} 条</span>
          <span class="label">今日确认</span><span class="val">${t.draftsConfirmed} 条</span>
          <span class="label">待处理</span><span class="val">${t.pendingTotal} 条</span>
          <span class="label">累计确认</span><span class="val">${s.totalConfirmed} 条</span>
          <span class="label">OCR失败</span><span class="val">${s.totalOcrFailures} 条</span>
          <span class="label">泄露检测</span><span class="val">${s.leakDetected ? '⚠ 检测到' : '无'}</span>
        `
      } catch (e) {
        // trial endpoint not available, hide panel
      }
    }

    async function recordTrialDay() {
      try {
        const res = await fetch('/api/trial/record', { method: 'POST' })
        const data = await res.json()
        if (data.ok) {
          showToast(`已记录第 ${data.totalDays} 天试用数据`)
          loadTrialStats()
        }
      } catch (e) {
        showToast('记录失败')
      }
    }

    loadDashboard()
    loadDrafts()
    loadMemories()
    loadTrialStats()
  </script>
</body>
</html>
